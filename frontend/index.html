<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Система</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
</head>
<body>
<div class="form_container">
	<div id="message"></div>
	<form id="form">
		<input id='username' type="text" name="username">
		<input id='password' type="text" name="password">
		<input type="submit" name="send" value="Отправить">
	</form>
</div>
</br>
<div>
	<button id="reload_table">Reload Table</button>
	<table class="flexme" id="table" border="1">
	  <thead>
		<tr>
		  <th width="100">id</th>
		  <th width="100">username</th>
		  <th width="100">read_only</th>
		</tr>
	  </thead>
	  <tbody>
		<tr id="test">
		  <td></td>
		</tr>
	   </tbody>
	</table>
</div>




<script>
var settings = {
                "url": "http://localhost:5003/api/v1",
                "crossDomain": true,
                "async": false,
                "timeout": 0,
                "headers": {
                            "Content-Type": "application/json",
                            "Access-Control-Allow-Headers": "*"
                            },
                };

// login
$("#form").on("submit", function() {
	settings['url'] += '/auth/token'
	settings['method'] = 'POST'
	settings['data'] = JSON.stringify({
                                        "username": $('#username').val(),
                                        "password": $('#password').val(),
                                        }),
	$.ajax(settings)
			.done(function (response) {
										settings['headers']['Authorization'] = 'Bearer '+response['access_token']
										alert(JSON.stringify(response));
									})
			.fail(function (jqXHR, textStatus, errorThrown) { alert(jqXHR['responseJSON']['detail']); });
});

// user list
$("#reload_table").on("click", function() {
	settings['url'] += '/users'
	settings['method'] = 'GET'
	$.ajax(settings)
			.done(function (response) { alert(JSON.stringify(response));})
			.fail(function (jqXHR, textStatus, errorThrown) { alert(jqXHR['responseJSON']['detail']); });
});

</script>
</body>
</html>
